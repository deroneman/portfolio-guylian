name: 🔄 Mettre à jour la Veille Technologique

on:
  # S'exécute tous les jours à 07:00 UTC
  schedule:
    - cron: '0 7 * * *'
  
  # Permet aussi de déclencher manuellement
  workflow_dispatch:

jobs:
  update-veille:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code du repository
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      # 2. Configurer Python
      - name: 🐍 Configurer Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # 3. Installer les dépendances
      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests
      
      # 4. Exécuter le script de mise à jour
      - name: 🚀 Mettre à jour la veille technologique
        run: |
          cd ${{ github.workspace }}
          python scripts/update-veille.py
      
      # 5. Configurer Git
      - name: ⚙️ Configurer Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
      
      # 6. Vérifier les changements
      - name: 📋 Vérifier les changements
        run: |
          if git diff --quiet; then
            echo "✅ Pas de changements"
          else
            echo "📝 Changements détectés:"
            git diff --name-only
          fi
      
      # 7. Committer et pusher les changements
      - name: 💾 Committer et pusher les changements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add veille-articles.json
            git commit -m "🔄 Mise à jour automatique de la veille technologique - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            echo "✨ Changements pushés avec succès!"
          else
            echo "ℹ️ Aucun changement à committer"
          fi
